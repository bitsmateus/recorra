name: CI

# Verifica cada push e PR ANTES do deploy: roda o mesmo build do EasyPanel
# (prisma generate + tsc/nest build) mais os testes. Se ficar vermelho, o
# commit tem erro de compilação — não suba pro EasyPanel até virar verde.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (recorra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recorra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: recorra/package-lock.json
      - run: npm ci
      # generate lê só o schema; não conecta no banco, mas quer a env definida.
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      - run: npm run build
      - run: npm test

  frontend:
    name: Frontend (recorra-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recorra-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: recorra-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  # Só reimplanta no EasyPanel quando backend e frontend ficaram verdes, e apenas
  # em push na main (PR não faz deploy). Cada serviço tem seu Deploy Hook, guardado
  # como secret do repositório. Se o secret não estiver configurado, o passo é pulado
  # (não falha o CI) — configure os secrets para ligar o deploy automático.
  deploy:
    name: Deploy no EasyPanel
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Reimplantar backend
        env:
          HOOK: ${{ secrets.EASYPANEL_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -z "$HOOK" ]; then echo "EASYPANEL_DEPLOY_HOOK_BACKEND não configurado — pulando."; exit 0; fi
          curl -fsS -X POST "$HOOK" && echo "Deploy do backend disparado."
      - name: Reimplantar frontend
        env:
          HOOK: ${{ secrets.EASYPANEL_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$HOOK" ]; then echo "EASYPANEL_DEPLOY_HOOK_FRONTEND não configurado — pulando."; exit 0; fi
          curl -fsS -X POST "$HOOK" && echo "Deploy do frontend disparado."
