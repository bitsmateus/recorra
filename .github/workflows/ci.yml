name: CI

# Verifica cada push e PR ANTES do deploy: roda o mesmo build do EasyPanel
# (prisma generate + tsc/nest build) mais os testes. Se ficar vermelho, o
# commit tem erro de compilação — não suba pro EasyPanel até virar verde.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ajuda:
    name: Central de Ajuda atualizada
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: node scripts/check-help-docs.mjs

  backend:
    name: Backend (recorra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recorra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: recorra/package-lock.json
      - run: npm ci
      # generate lê só o schema; não conecta no banco, mas quer a env definida.
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      - run: npm run build
      - run: npm test

  frontend:
    name: Frontend (recorra-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recorra-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: recorra-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  # Só reimplanta no EasyPanel quando backend e frontend ficaram verdes, e apenas
  # em push na main (PR não faz deploy). Cada serviço tem seu Deploy Hook, guardado
  # como secret do repositório. Se o secret não estiver configurado, o passo é pulado
  # (não falha o CI) — configure os secrets para ligar o deploy automático.
  deploy:
    name: Deploy no EasyPanel
    needs: [ajuda, backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Backend roda em 2 serviços no EasyPanel: 'api' (HTTP) e 'worker' (cron/fila),
      # ambos a partir da pasta recorra/. 'app' é o frontend (recorra-web/).
      # Cada Deploy Webhook fica num secret; se ausente, o passo é pulado sem falhar.
      - name: Reimplantar api (backend HTTP)
        env:
          HOOK: ${{ secrets.EASYPANEL_DEPLOY_HOOK_API }}
        run: |
          if [ -z "$HOOK" ]; then echo "EASYPANEL_DEPLOY_HOOK_API não configurado — pulando."; exit 0; fi
          curl -fsS -X POST "$HOOK" && echo "Deploy do api disparado."
      - name: Reimplantar worker (cron/fila)
        env:
          HOOK: ${{ secrets.EASYPANEL_DEPLOY_HOOK_WORKER }}
        run: |
          if [ -z "$HOOK" ]; then echo "EASYPANEL_DEPLOY_HOOK_WORKER não configurado — pulando."; exit 0; fi
          curl -fsS -X POST "$HOOK" && echo "Deploy do worker disparado."
      - name: Reimplantar app (frontend)
        env:
          HOOK: ${{ secrets.EASYPANEL_DEPLOY_HOOK_APP }}
        run: |
          if [ -z "$HOOK" ]; then echo "EASYPANEL_DEPLOY_HOOK_APP não configurado — pulando."; exit 0; fi
          curl -fsS -X POST "$HOOK" && echo "Deploy do app disparado."
